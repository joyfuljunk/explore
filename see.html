<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Explore Platonic Solids</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #020617;
    font-family: Arial, sans-serif;
    color: white;
  }

  #ui {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 320px;
    z-index: 10;
    background: rgba(0,0,0,0.7);
    padding: 20px;
    border-radius: 18px;
    backdrop-filter: blur(10px);
  }

  h1 {
    margin-top: 0;
    font-size: 24px;
    letter-spacing: 1px;
  }

  button {
    padding: 10px 14px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    background: #2563eb;
    color: white;
    cursor: pointer;
    font-size: 14px;

    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;

    transition: 0.2s;
  }

  button:hover {
    background: #3b82f6;
    transform: translateY(-2px);
  }

  .info {
    margin-top: 18px;
    line-height: 1.7;
    font-size: 15px;
  }

  .slider {
    width: 100%;
    margin-top: 14px;
  }
</style>
</head>

<body>

<div id="ui">

  <h1>Explore Polyhedra</h1>

  <div>
    <button onclick="setShape('tetrahedron')">tetrahedron</button>
    <button onclick="setShape('cube')">cube</button>
    <button onclick="setShape('octahedron')">octahedron</button>
    <button onclick="setShape('dodecahedron')">dodecahedron</button>
    <button onclick="setShape('icosahedron')">icosahedron</button>
  </div>

  <input
    type="range"
    min="20"
    max="100"
    value="100"
    id="slider"
    class="slider"
  >

  <div class="info" id="infoBox">
    Cube<br>
    Faces: 6<br>
    Edges: 12<br>
    Vertices: 8
  </div>

</div>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020617);

const camera = new THREE.PerspectiveCamera(
  70,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({
  antialias: true
});

renderer.setSize(
  window.innerWidth,
  window.innerHeight
);

renderer.shadowMap.enabled = true;

document.body.appendChild(
  renderer.domElement
);

const ambient = new THREE.AmbientLight(
  0xffffff,
  1.5
);

scene.add(ambient);

const light = new THREE.DirectionalLight(
  0xffffff,
  2
);

light.position.set(5, 10, 7);

scene.add(light);

const rimLight = new THREE.DirectionalLight(
  0x60a5fa,
  1.5
);

rimLight.position.set(-5, -3, -5);

scene.add(rimLight);

const geometryMap = {
  tetrahedron: new THREE.TetrahedronGeometry(1.4),
  cube: new THREE.BoxGeometry(2, 2, 2),
  octahedron: new THREE.OctahedronGeometry(1.5),
  dodecahedron: new THREE.DodecahedronGeometry(1.4),
  icosahedron: new THREE.IcosahedronGeometry(1.5)
};

const infoMap = {

  tetrahedron: {
    name: 'Tetrahedron',
    faces: 4,
    edges: 6,
    vertices: 4,
    color: 0xf472b6
  },

  cube: {
    name: 'Cube',
    faces: 6,
    edges: 12,
    vertices: 8,
    color: 0x38bdf8
  },

  octahedron: {
    name: 'Octahedron',
    faces: 8,
    edges: 12,
    vertices: 6,
    color: 0x34d399
  },

  dodecahedron: {
    name: 'Dodecahedron',
    faces: 12,
    edges: 30,
    vertices: 20,
    color: 0xfbbf24
  },

  icosahedron: {
    name: 'Icosahedron',
    faces: 20,
    edges: 30,
    vertices: 12,
    color: 0xa78bfa
  }
};

let currentMesh;
let currentShape = 'cube';

let velocityX = 0;
let velocityY = 0;

function createShape(type) {

  if (currentMesh) {
    scene.remove(currentMesh);
  }

  const material = new THREE.MeshStandardMaterial({
    color: infoMap[type].color,
    metalness: 0.2,
    roughness: 0.25,
    transparent: true,
    opacity: 0.95,
    flatShading: true
  });

  currentMesh = new THREE.Mesh(
    geometryMap[type].clone(),
    material
  );

  const wireframe = new THREE.LineSegments(
    new THREE.EdgesGeometry(
      geometryMap[type]
    ),
    new THREE.LineBasicMaterial({
      color: 0xffffff
    })
  );

  currentMesh.add(wireframe);

  scene.add(currentMesh);

  updateInfo(type);

  updateButtons(type);
}

function updateInfo(type) {

  const data = infoMap[type];

  document.getElementById(
    'infoBox'
  ).innerHTML = `
    <strong>${data.name}</strong><br>
    Faces (F): ${data.faces}<br>
    Edges (E): ${data.edges}<br>
    Vertices (V): ${data.vertices}<br><br>

    Euler's Formula:<br>
    ${data.vertices} - ${data.edges} + ${data.faces} = 2
  `;
}

function updateButtons(type) {

  document.querySelectorAll('button')
    .forEach(btn => {
      btn.classList.remove('active');
    });

  const activeButton =
    document.querySelector(
      `button[onclick="setShape('${type}')"]`
    );

  if (activeButton) {
    activeButton.classList.add('active');
  }
}

function setShape(type) {

  currentShape = type;

  createShape(type);
}

const slider = document.getElementById('slider');

slider.addEventListener('input', () => {

  const value = Math.max(
    0.2,
    slider.value / 100
  );

  if (currentMesh) {

    currentMesh.scale.set(
      value,
      value,
      value
    );
  }
});

let isDragging = false;

let previousX = 0;
let previousY = 0;

renderer.domElement.addEventListener(
  'mousedown',
  (e) => {

    isDragging = true;

    previousX = e.clientX;
    previousY = e.clientY;
  }
);

window.addEventListener(
  'mouseup',
  () => {

    isDragging = false;
  }
);

window.addEventListener(
  'mousemove',
  (e) => {

    if (!isDragging || !currentMesh)
      return;

    const deltaX =
      e.clientX - previousX;

    const deltaY =
      e.clientY - previousY;

    currentMesh.rotation.y +=
      deltaX * 0.01;

    currentMesh.rotation.x +=
      deltaY * 0.01;

    velocityX = deltaX * 0.002;
    velocityY = deltaY * 0.002;

    previousX = e.clientX;
    previousY = e.clientY;
  }
);

renderer.domElement.addEventListener(
  'touchstart',
  (e) => {

    isDragging = true;

    previousX =
      e.touches[0].clientX;

    previousY =
      e.touches[0].clientY;

  },
  { passive: true }
);

window.addEventListener(
  'touchend',
  () => {

    isDragging = false;
  }
);

window.addEventListener(
  'touchmove',
  (e) => {

    if (!isDragging || !currentMesh)
      return;

    const deltaX =
      e.touches[0].clientX -
      previousX;

    const deltaY =
      e.touches[0].clientY -
      previousY;

    currentMesh.rotation.y +=
      deltaX * 0.01;

    currentMesh.rotation.x +=
      deltaY * 0.01;

    velocityX = deltaX * 0.002;
    velocityY = deltaY * 0.002;

    previousX =
      e.touches[0].clientX;

    previousY =
      e.touches[0].clientY;

  },
  { passive: true }
);

function animate() {

  requestAnimationFrame(animate);

  if (currentMesh) {

    if (!isDragging) {

      currentMesh.rotation.y +=
        0.005 + velocityX;

      currentMesh.rotation.x +=
        velocityY;

      velocityX *= 0.95;
      velocityY *= 0.95;
    }
  }

  renderer.render(scene, camera);
}

createShape('cube');

animate();

window.addEventListener(
  'resize',
  () => {

    camera.aspect =
      window.innerWidth /
      window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
      window.innerWidth,
      window.innerHeight
    );
  }
);

</script>

</body>
</html>
